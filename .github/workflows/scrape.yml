name: Scrape and Publish Maine Poll Tracker

on:
  schedule:
    # 8 AM Eastern Time = 13:00 UTC (accounts for EDT; adjust to 12:00 in winter if desired)
    - cron: '0 13 * * *'
  workflow_dispatch:   # allows manual trigger from the Actions tab

permissions:
  contents: write      # needed to push index.html back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push index.html if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Always commit (touch last_run even if polls unchanged) so the repo
          # stays active and GitHub never disables the scheduled workflow.
          echo "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > last_run.txt
          git add last_run.txt
          git commit -m "chore: update poll data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Send daily confirmation email
        env:
          EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: |
          python3 - <<'EOF'
          import os, smtplib
          from email.mime.text import MIMEText
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc).strftime("%B %d, %Y at %H:%M UTC")
          body = f"""Maine 2026 Poll Tracker ran successfully at {now}.

          View the tracker: https://sloftus-lab.github.io/maine-poll-tracker

          This is an automated daily confirmation. No action needed.
          """
          msg = MIMEText(body)
          msg["Subject"] = f"✅ Maine Poll Tracker updated — {now}"
          msg["From"] = os.environ["EMAIL_FROM"]
          msg["To"] = os.environ["EMAIL_TO"]

          with smtplib.SMTP("smtp.gmail.com", 587) as s:
              s.starttls()
              s.login(os.environ["EMAIL_FROM"], os.environ["EMAIL_PASSWORD"])
              s.send_message(msg)
          print("Confirmation email sent.")
          EOF
